<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        video { width: 100%; max-height: 100vh; object-fit: cover; }
        #status { color: white; font-size: 18px; position: absolute; top: 20px; }
    </style>
</head>
<body>
    <video id="video" autoplay playsinline></video>
    <div id="status">Наведите камеру на штрихкод</div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        async function startScanner() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                const video = document.getElementById('video');
                video.srcObject = stream;
                await video.play();

                const detector = new BarcodeDetector({ formats: ['ean_13', 'ean_8', 'code_128', 'code_39', 'qr_code'] });
                
                async function scan() {
                    try {
                        const barcodes = await detector.detect(video);
                        if (barcodes.length > 0) {
                            stream.getTracks().forEach(track => track.stop());
                            const code = barcodes[0].rawValue;
                            // Отправляем штрихкод обратно в бота
                            tg.sendData(code);
                            tg.close();
                            return;
                        }
                    } catch (e) {}
                    requestAnimationFrame(scan);
                }
                scan();
            } catch (err) {
                document.getElementById('status').textContent = 'Ошибка доступа к камере';
            }
        }
        startScanner();
    </script>
</body>
</html>
