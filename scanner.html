<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }
        video {
            width: 100%;
            max-height: 100vh;
            object-fit: cover;
            display: none;
        }
        #status {
            color: white;
            font-size: 16px;
            text-align: center;
            padding: 16px;
            background: rgba(0,0,0,0.7);
            border-radius: 12px;
            margin: 20px;
        }
        #startBtn {
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px 28px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin: 20px;
            transition: background 0.2s;
        }
        #startBtn:active {
            background: #2563eb;
        }
    </style>
</head>
<body>
    <video id="video" autoplay playsinline></video>
    <div id="status">Нажмите кнопку, чтобы начать сканирование</div>
    <button id="startBtn">📷 Начать сканирование</button>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let stream = null;
        const video = document.getElementById('video');
        const statusEl = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');

        async function requestCamera() {
            // Пробуем официальный метод Telegram (если доступен)
            if (typeof tg.requestCameraAccess === 'function') {
                statusEl.textContent = 'Ожидание разрешения камеры...';
                const granted = await tg.requestCameraAccess();
                if (!granted) {
                    statusEl.textContent = '❌ Доступ к камере не предоставлен.';
                    return false;
                }
            }
            // Запрашиваем стандартным способом
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                return true;
            } catch (e) {
                statusEl.textContent = '❌ Не удалось получить доступ к камере. Возможно, камера занята другим приложением.';
                return false;
            }
        }

        async function startScan() {
            startBtn.style.display = 'none';
            statusEl.textContent = 'Подключаю камеру...';

            const ok = await requestCamera();
            if (!ok) return;

            video.srcObject = stream;
            video.style.display = 'block';
            statusEl.textContent = 'Наведите камеру на штрихкод';

            try {
                await video.play(); // теперь это внутри жеста (клика)
            } catch (e) {
                statusEl.textContent = '❌ Не удалось запустить видео. Попробуйте снова.';
                return;
            }

            // Начинаем сканирование
            const detector = new BarcodeDetector({ formats: ['ean_13', 'ean_8', 'code_128', 'code_39', 'qr_code'] });

            async function scan() {
                try {
                    const barcodes = await detector.detect(video);
                    if (barcodes.length > 0) {
                        // Успешно
                        stream.getTracks().forEach(t => t.stop());
                        tg.sendData(barcodes[0].rawValue);
                        tg.close();
                        return;
                    }
                } catch (e) {}
                requestAnimationFrame(scan);
            }
            scan();
        }

        startBtn.addEventListener('click', startScan);
        startBtn.addEventListener('touchend', (e) => {
            e.preventDefault();
            startScan();
        });
    </script>
</body>
</html>
